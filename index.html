<!--
  App shell: single HTML entry for the SPA.
  React mounts into #root; Vite injects the script for main.jsx.
  All route paths (e.g. /about) must serve this file so React Router can handle them.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO & Metadata -->
    <title>Navbar Header – React, Vite, Responsive Navigation | Arnob Mahmud</title>
    <meta name="description" content="Responsive Navbar built with React, Vite, and custom CSS. Toggleable mobile/desktop links, social icons, and smooth transitions. Fundamental Project 11 – by Arnob Mahmud." />
    <meta name="author" content="Arnob Mahmud (https://www.arnobmahmud.com, contact@arnobmahmud.com)" />
    <meta name="keywords" content="React, Vite, Navbar, responsive navigation, JavaScript, custom CSS, useState, useRef, react-icons, frontend, Arnob Mahmud" />
    <meta name="theme-color" content="#49a6e9" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Navbar Header – React, Vite, Responsive Navigation | Arnob Mahmud" />
    <meta property="og:description" content="Responsive Navbar with React, Vite, and custom CSS. Mobile/desktop toggle, social icons, smooth transitions." />
    <meta property="og:url" content="https://navbar-link.vercel.app/" />
    <meta property="og:image" content="https://navbar-link.vercel.app/vite.svg" />
    <meta property="og:site_name" content="Navbar Header – React Fundamental Project 11" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Navbar Header – React, Vite, Responsive Navigation | Arnob Mahmud" />
    <meta name="twitter:description" content="Responsive Navbar with React, Vite, and custom CSS. Mobile/desktop toggle, social icons, smooth transitions." />
    <!-- Canonical -->
    <link rel="canonical" href="https://navbar-link.vercel.app/" />
  </head>
  <body>
    <!-- React root: entire app is rendered here by main.jsx -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
